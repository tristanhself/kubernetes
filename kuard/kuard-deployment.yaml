# Deployment Definition
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuard
  labels:
    app: kuard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kuard
  template:
    metadata:
      labels:
        app: kuard
    spec:
      containers:
        - name: kuard
          image: othonishiyi/kuard-amd64:blue
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 256m
              memory: 128Mi
            limits:
              cpu: 512m
              memory: 256Mi
          startupProbe: # Probe to check container has started successfully. Runs only at startup.
            httpGet:
              path: /healthy
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe: # Probe checks if container (application) is responding, restarts container if it fails.
            httpGet:
              path: /healthy
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe: # Probe checks if container (application) is ready to accept traffic, stops traffic being sent to container if it fails. But does not restart it.
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 3
---
# Service Definition
apiVersion: v1
kind: Service
metadata:
  name: kuard-service
  labels:
    app: kuard
spec: 
  type: LoadBalancer
  allocateLoadBalancerNodePorts: true # Requires a redeploy to add or remove.
  selector:
    app: kuard
  ports:
  - port: 8080
    targetPort: 8080