apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-api
  labels:
    app: color-api
spec:
  replicas: 6
  selector:
    matchLabels:
      app: color-api
  template:
    metadata:
      labels:
        app: color-api
    spec:
      containers:
        - name: color-backend
          image: geekmungus/color-api:1.1.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: color-api-service
  labels:
    app: color-api
spec: 
  type: LoadBalancer
  selector:
    app: color-api
  ports:
  - port: 80
    targetPort: 80