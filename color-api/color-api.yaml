apiVersion: v1
kind: Pod
metadata:
  name: color-apils
  labels:
    app: color-api
spec:
  containers:
    - name: color-backend
      image: geekmungus/color-api:1.1.0
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: color-api-service
  labels:
    app: color-api
spec: 
  type: LoadBalancer
  selector:
    app: color-api
  ports:
  - port: 80
    targetPort: 80