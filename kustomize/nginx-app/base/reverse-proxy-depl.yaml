apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-proxy
spec:
  selector:
    matchLabels:
      app: reverse-proxy
  template:
    metadata:
      labels:
        app: reverse-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:1.27.0
        resources:
          requests:
            cpu: '250m'
            memory: '256Mi'
          limits:
            cpu: '500m'
            memory: '512Mi'
        ports:
          - containerPort: 80
