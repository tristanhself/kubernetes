apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: micro-seg1
spec:
  podSelector:
    matchLabels:
      app: nginx-custom
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
---
