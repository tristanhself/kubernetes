apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
  namespace: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Object
      object:
        metric:
          name: translation_queue_length
        describedObject:
          apiVersion: v1
          kind: Service
          name: redis
        target:
          type: Value
          value: '5'
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
