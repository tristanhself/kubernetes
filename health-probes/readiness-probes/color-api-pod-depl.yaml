apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-api
  labels:
    name: color-api
spec:
  replicas: 6
  selector:
    matchLabels:
      app: color-api
  template:
    metadata:
      labels:
        app: color-api
    spec:
      containers:
        - name: color-api-pod
          image: geekmungus/color-api:1.3.1
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: '128m'
              memory: '128Mi'
            limits:
              cpu: '256m'
              memory: '256Mi'
          env:
            - name: DELAY_STARTUP
              value: 'false'
            - name: FAIL_LIVENESS
              value: 'false'
            - name: FAIL_READINESS
              value: 'true'
          startupProbe:
            httpGet:
              path: /up
              port: 80
            failureThreshold: 2
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            failureThreshold: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 80
            failureThreshold: 2
            periodSeconds: 5