apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: dev
  labels:
    name: nginx
spec:
  containers:
  - name: nginx
    image: nginx:1.27.0
    resources:
      requests:
        cpu: '250m'
        memory: '256Mi'
      limits:
        cpu: '500m'
        memory: '512Mi'
    ports:
      - containerPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: prod
  labels:
    name: nginx
spec:
  containers:
  - name: nginx
    image: nginx:1.27.0
    resources:
      requests:
        cpu: '250m'
        memory: '256Mi'
      limits:
        cpu: '500m'
        memory: '512Mi'
    ports:
      - containerPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: alpine-curl
  namespace: dev
  labels:
    name: alpine-curl
spec:
  serviceAccountName: pod-inspector
  containers:
  - name: curl
    image: geekmungus/alpine-curl:1.0.4
    command:
      - 'sh'
      - '-c'
      - 'sleep 3600'
    resources:
      requests:
        cpu: '250m'
        memory: '256Mi'
      limits:
        cpu: '500m'
        memory: '512Mi'
    ports:
      - containerPort: 80