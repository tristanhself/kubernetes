apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-admin
roleRef:
  kind: ClusterRole
  name: pod-admin
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: Group
    name: admin # Matches the group specified in the user certificate.
    apiGroup: rbac.authorization.k8s.io