apiVersion: v1
kind: Pod
metadata:
  name: nginx-restricted
  labels:
    name: nginx-restricted
spec:
  containers:
  - name: nginx
    image: nginxinc/nginx-unprivileged:1.27.1
    resources:
      requests:
        cpu: '250m'
        memory: '256Mi'
      limits:
        cpu: '500m'
        memory: '512Mi'
    ports:
      - containerPort: 80
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ['ALL']
      runAsNonRoot: true
      seccompProfile: 
        type: RuntimeDefault