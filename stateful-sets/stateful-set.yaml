apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-ss
spec:
  serviceName: busybox
  replicas: 2
  selector:
    matchLabels:
      app: busybox
  template:
    metadata:
      labels:
        app: busybox
    spec:
      containers:
        - name: busybox
          image: busybox:1.36.1
          command:
            - 'sh'
            - '-c'
            - 'sleep 3600'
          resources:  
            requests:
              cpu: '250m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          volumeMounts:
            - name: local-volume
              mountPath: /mnt/local
  volumeClaimTemplates:
    - metadata:
        name: local-volume
      spec:
        accessModes:
          - ReadWriteOnce
        #storageClassName: local-storage # Statically Provisioned
        storageClassName: standard # Dynamically Provisioned
        resources:
          requests:
            storage: 128Mi