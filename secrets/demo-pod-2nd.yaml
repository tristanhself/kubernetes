apiVersion: v1
kind: Pod
metadata:
  name: busybox2
  labels:
    name: busybox2
spec:
  containers:
  - name: busybox2
    image: busybox:1.36.1
    command:
      - 'sh'
      - '-c'
      - 'echo "$username" && echo "$password" && sleep 1800'
    envFrom:
      - secretRef:
          name: db-creds
    resources:
      requests:
        cpu: '200m'
        memory: '256Mi'
      limits:
        cpu: '500m'
        memory: '512Mi'