apiVersion: v1
kind: Pod
metadata:
  name: busybox3
  labels:
    name: busybox3
spec:
  containers:
  - name: busybox3
    image: busybox:1.36.1
    command:
      - 'sh'
      - '-c'
      - 'sleep 1800'
    resources:
      requests:
        cpu: '200m'
        memory: '256Mi'
      limits:
        cpu: '500m'
        memory: '512Mi'
    volumeMounts:
      - name: db-secrets
        mountPath: /etc/db
  volumes:
    - name: db-secrets
      secret:
        secretName: db-creds