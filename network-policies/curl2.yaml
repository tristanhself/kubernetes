apiVersion: v1
kind: Pod
metadata:
  name: curl2
  labels:
    app: curl2
    tier: backend
spec:
  containers:
    - name: curl2
      image: lmacademy/alpine-curl:1.0.0
      resources:
        requests:
          cpu: '250m'
          memory: '256Mi'
        limits:
          cpu: '500m'
          memory: '512Mi'