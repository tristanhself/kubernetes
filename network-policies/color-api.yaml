apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-api
spec:
  selector:
    matchLabels:
      app: color-api
  template:
    metadata:
      labels:
        app: color-api
    spec:
      containers:
      - name: color-api
        image: geekmungus/color-api:1.4.0
        resources:
          requests:
            cpu: '250m'
            memory: '256Mi'
          limits:
            cpu: '500m'
            memory: '512Mi'
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: color-svc
spec:
  selector:
    app: color-api
  ports:
  - port: 80
    targetPort: 80
